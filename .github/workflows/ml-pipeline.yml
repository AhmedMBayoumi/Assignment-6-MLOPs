name: ML Model CI

on:
  push:
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checking out
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Linter Check
        run: |
          pip install flake8
          flake8 .

      - name: Model Dry Test
        run: |
          python -c "import torch; print('Model environment ready!')"

      - name: Upload README
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md

  train:
    needs: validate-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-train]')
    steps:
      - name: Checking out
        uses: actions/checkout@v3

      - name: Heavy Training
        run: python train.py 

      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error_logs
          path: error_logs.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."